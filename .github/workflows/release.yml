name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  VERSION: ${{ github.event.release.tag_name }}

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          LDFLAGS="-s -w"
          LDFLAGS="$LDFLAGS -X github.com/bonztm/agent-context-manager/internal/buildinfo.version=${{ env.VERSION }}"
          LDFLAGS="$LDFLAGS -X github.com/bonztm/agent-context-manager/internal/buildinfo.commitShort=${GITHUB_SHA::7}"
          mkdir -p dist
          for bin in acm acm-mcp acm-web; do
            go build -ldflags "$LDFLAGS" -o "dist/${bin}" "./cmd/${bin}"
          done
          cd dist && tar czf "../acm-${{ env.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" acm acm-mcp acm-web

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ env.VERSION }}" "acm-${{ env.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" --clobber

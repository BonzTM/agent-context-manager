# Release pipeline. Publishing a GitHub release (from the release notes, per
# the house flow) triggers a per-architecture matrix that builds stamped,
# static binaries, packages them as archives, and uploads them to that release
# — the same shape as the sibling agent-workflow-manager repo. CI (ci.yml)
# proves the commit; this workflow only packages it.
#
# Tag convention: releases are cut from either tag form; the mirror job
# guarantees BOTH exist on the release commit — bare X.Y.Z (house style, what
# humans type) and vX.Y.Z (required by the Go toolchain for canonical module
# resolution, so `go install ...@latest` sees the release). Display strings
# drop the v everywhere.

name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)build assets for"
        required: true

permissions:
  contents: write # push the mirror tag, upload release assets

env:
  TAG: ${{ github.event.release.tag_name || inputs.tag }}

jobs:
  mirror-tags:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }}
      - name: Ensure both bare and v-prefixed tags exist
        run: |
          BARE="${TAG#v}"
          COMMIT="$(git rev-parse HEAD)"
          for ref in "${BARE}" "v${BARE}"; do
            if git ls-remote --exit-code origin "refs/tags/${ref}" > /dev/null 2>&1; then
              echo "tag ${ref} already exists"
            else
              git tag "${ref}" "${COMMIT}"
              git push origin "refs/tags/${ref}"
            fi
          done

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.TAG }}
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build stamped static binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION="${TAG#v}"
          COMMIT="$(git rev-parse HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          PKG="github.com/bonztm/agent-context-manager/internal/buildinfo"
          LDFLAGS="-s -w -X ${PKG}.Version=${VERSION} -X ${PKG}.Commit=${COMMIT} -X ${PKG}.Date=${DATE}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          mkdir -p dist
          go build -trimpath -ldflags "${LDFLAGS}" -o "dist/acm${EXT}" ./cmd/acm

      - name: Package release archive
        run: |
          VERSION="${TAG#v}"
          ARCHIVE="acm-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "../${ARCHIVE}.zip" acm.exe
            cd .. && sha256sum "${ARCHIVE}.zip" > "${ARCHIVE}.zip.sha256"
          else
            tar czf "../${ARCHIVE}.tar.gz" acm
            cd .. && sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${TAG#v}"
          ARCHIVE="acm-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            gh release upload "${TAG}" "${ARCHIVE}.zip" "${ARCHIVE}.zip.sha256" --clobber
          else
            gh release upload "${TAG}" "${ARCHIVE}.tar.gz" "${ARCHIVE}.tar.gz.sha256" --clobber
          fi

# acm-rules.yaml
# Sane starter ruleset for a new repo using acm.
# Save this as .acm/acm-rules.yaml (preferred) or acm-rules.yaml in the project root.

version: acm.rules.v1
rules:
  - id: rule_startup_get_context
    summary: Start every task with get_context.
    content: Retrieve context before reading or editing repo files, then follow every hard rule returned in the receipt.
    enforcement: hard
    tags: [startup, context]

  - id: rule_fetch_surgically
    summary: Keep context compact by fetching only the artifacts needed for the current step.
    content: Fetch the specific pointer, plan, or task keys you need. If the receipt is missing obvious context, rerun get_context with a better task description instead of bulk fetching.
    enforcement: soft
    tags: [context, efficiency]

  - id: rule_track_multistep_work
    summary: Track multi-step or multi-file work with work.
    content: Create or update a work plan when the task spans multiple steps, touches multiple files, or may need to survive context compaction. Use verify:tests as the executable verification task when code changes, and add any extra task keys required by .acm/acm-workflows.yaml.
    enforcement: hard
    tags: [planning, tracking]

  - id: rule_no_silent_scope_expansion
    summary: Do not silently widen scope.
    content: If the task spills into adjacent systems, files, or decisions that are not represented in the current receipt, rerun get_context or fetch the missing artifacts before making changes.
    enforcement: hard
    tags: [scope, safety]

  - id: rule_verify_code_changes
    summary: Run verify before closing code, config, or behavior changes.
    content: Use repo-defined verify checks that match the changed files and current phase. Do not call report_completion until executable verification has passed or the required completion tasks from .acm/acm-workflows.yaml are satisfied.
    enforcement: hard
    tags: [verification, quality]

  - id: rule_report_completion
    summary: Finish every task with report_completion.
    content: Report every changed file and give a concise outcome summary. If nothing changed, say so explicitly in the outcome.
    enforcement: hard
    tags: [completion, audit]

  - id: rule_capture_durable_memory
    summary: Persist reusable decisions and gotchas with propose_memory.
    content: Record stable architectural decisions, recurring setup pitfalls, or operator preferences when future tasks would benefit from retrieving them automatically.
    enforcement: soft
    tags: [memory, learning]

  - id: rule_escalate_missing_decisions
    summary: Escalate when a task depends on a missing product or architectural decision.
    content: Do not invent product requirements, compatibility guarantees, migrations, or rollout behavior when the repo does not define them. Surface the decision and wait for direction.
    enforcement: hard
    tags: [escalation, safety]

# Field notes:
# - id: optional; when omitted, acm generates a deterministic stable id.
# - summary: required (title or content may substitute, but summary is preferred).
# - content: optional; defaults to summary when omitted.
# - enforcement: optional; defaults to "hard" (allowed: hard|soft).
# - tags: optional.

# Maintenance flow:
# 1) Add/remove/update entries under rules.
# 2) Run sync OR health-fix --apply.
# 3) Run health and resolve blocking findings.

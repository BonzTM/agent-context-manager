# Save this as .acm/acm-tests.yaml (preferred) or acm-tests.yaml in the project root.
# Go-oriented starter verification file for a new service repo.
# Keep the structure, then swap argv/selectors to match your stack.
# `verify` is for deterministic repo-defined executable checks.
# Repo-local verify scripts can inspect ACM_RECEIPT_ID, ACM_PLAN_KEY,
# ACM_VERIFY_PHASE, ACM_VERIFY_TAGS_JSON, and ACM_VERIFY_FILES_CHANGED_JSON.

version: acm.tests.v1

defaults:
  cwd: .
  timeout_sec: 300

tests:
  - id: smoke
    summary: Run fast smoke checks on every verification pass
    command:
      argv: ["go", "test", "./cmd/...", "./internal/..."]
    select:
      always_run: true
    expected:
      exit_code: 0

  - id: go-unit
    summary: Run Go unit and package tests when application code changes
    command:
      argv: ["go", "test", "./..."]
      env:
        GOFLAGS: "-count=1"
    select:
      phases: ["execute", "review"]
      changed_paths_any: ["cmd/**", "internal/**", "pkg/**", "go.mod", "go.sum"]
    expected:
      exit_code: 0

  - id: go-build
    summary: Ensure CLI and service entrypoints still build
    command:
      argv: ["go", "build", "./cmd/..."]
    select:
      phases: ["execute", "review"]
      changed_paths_any: ["cmd/**", "internal/**", "pkg/**", "go.mod", "go.sum"]
    expected:
      exit_code: 0

  - id: go-vet
    summary: Run static checks before closing Go changes
    command:
      argv: ["go", "vet", "./..."]
    select:
      phases: ["review"]
      changed_paths_any: ["cmd/**", "internal/**", "pkg/**", "go.mod", "go.sum"]
    expected:
      exit_code: 0


version: acm.bootstrap-template.v1
id: claude-receipt-guard
summary: Add Claude hook settings plus ACM receipt guard scripts.
operations:
  - type: merge_json
    target: .claude/settings.json
    source: files/.claude/settings.json
  - type: create_if_missing
    target: .claude/hooks/acm-receipt-guard.sh
    source: files/.claude/hooks/acm-receipt-guard.sh
    mode: "0755"
  - type: create_if_missing
    target: .claude/hooks/acm-receipt-mark.sh
    source: files/.claude/hooks/acm-receipt-mark.sh
    mode: "0755"

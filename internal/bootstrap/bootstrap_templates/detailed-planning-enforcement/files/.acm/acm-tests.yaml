# Save this as .acm/acm-tests.yaml (preferred) or acm-tests.yaml in the project root.
# Language-agnostic starter verification file with repo-local feature-plan validation.

version: acm.tests.v1

defaults:
  cwd: .
  timeout_sec: 300

tests:
  - id: smoke
    summary: Confirm ACM can load repo-local setup and report current status
    command:
      argv: ["acm", "status", "--project-root", "."]
    select:
      always_run: true
    expected:
      exit_code: 0

  - id: repo-diff-check
    summary: Catch whitespace errors and unresolved merge markers in tracked changes
    command:
      argv: ["git", "diff", "--check"]
    select:
      phases: ["execute", "review"]
      changed_paths_any: ["**"]
    expected:
      exit_code: 0

  - id: repo-status
    summary: Ensure git can still read the working tree after a change
    command:
      argv: ["git", "status", "--short", "--untracked-files=no"]
    select:
      phases: ["review"]
      changed_paths_any: ["**"]
    expected:
      exit_code: 0

  - id: feature-plan-help
    summary: Ensure the repo-local feature-plan validator is runnable
    command:
      argv: ["python3", "scripts/acm-feature-plan-validate.py", "--help"]
    select:
      phases: ["execute", "review"]
      changed_paths_any: ["AGENTS.md", "CLAUDE.md", ".acm/**", "README.md", "docs/**", "scripts/**"]
    expected:
      exit_code: 0

  - id: feature-plan-validate
    summary: Validate the repo-local feature plan schema for active feature work
    command:
      argv: ["python3", "scripts/acm-feature-plan-validate.py"]
    select:
      phases: ["execute", "review"]
      changed_paths_any: ["**"]
    expected:
      exit_code: 0

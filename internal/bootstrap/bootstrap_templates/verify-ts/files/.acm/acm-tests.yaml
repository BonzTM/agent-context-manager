# Save this as .acm/acm-tests.yaml (preferred) or acm-tests.yaml in the project root.
# TypeScript-oriented starter verification file for a new repo.
# Keep the structure, then swap argv/selectors to match your package manager and scripts.

version: acm.tests.v1

defaults:
  cwd: .
  timeout_sec: 300

tests:
  - id: smoke
    summary: Run the default project test script on every verification pass
    command:
      argv: ["npm", "test"]
    select:
      always_run: true
    expected:
      exit_code: 0

  - id: ts-build
    summary: Ensure the TypeScript project still builds
    command:
      argv: ["npm", "run", "build"]
    select:
      phases: ["execute", "review"]
      changed_paths_any: ["src/**", "app/**", "lib/**", "test/**", "tests/**", "package.json", "package-lock.json", "pnpm-lock.yaml", "yarn.lock", "tsconfig*.json"]
    expected:
      exit_code: 0

  - id: ts-lint
    summary: Run the repo lint script before closing TypeScript changes
    command:
      argv: ["npm", "run", "lint"]
    select:
      phases: ["review"]
      changed_paths_any: ["src/**", "app/**", "lib/**", "test/**", "tests/**", "package.json", "package-lock.json", "pnpm-lock.yaml", "yarn.lock", "tsconfig*.json"]
    expected:
      exit_code: 0

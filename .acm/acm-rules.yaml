version: acm.rules.v1
rules:
  - id: rule_start_with_context
    summary: Start each task with context and fetch only what is needed.
    content: >-
      Run `acm context` first, then fetch specific keys for the current step
      instead of broad retrieval.
    enforcement: hard
    tags: [context, workflow]

  - id: rule_plan_before_code
    summary: Plan and track multi-step work before writing code.
    content: >-
      For tasks spanning more than one step or file, create ACM work before
      implementation. In this repo, governed multi-step plans must use the
      staged plan contract: `kind=feature|maintenance|governance`, explicit
      objective/scope/constraints/references,
      `plan.stages.spec_outline` / `refined_spec` / `implementation_plan`,
      top-level `stage:*` tasks, and atomic leaf tasks with exact `references`
      plus explicit `acceptance_criteria`. Include `verify:tests` for code,
      contract, onboarding, or behavior changes. Single-file, single-purpose
      fixes are exempt.
    enforcement: hard
    tags: [planning, work]

  - id: rule_repo_staged_plan_schema
    summary: Governed multi-step work in this repo must use the staged plan contract.
    content: >-
      For governed multi-file or multi-step work in this repo, create a root
      ACM plan with `kind=feature|maintenance|governance`, explicit scope
      metadata, `stages.spec_outline` / `refined_spec` /
      `implementation_plan`, top-level `stage:*` tasks, and leaf tasks that
      include exact `references` plus explicit `acceptance_criteria`. Use
      `acm verify` to enforce the schema through
      `scripts/acm-feature-plan-validate.py`.
    enforcement: hard
    tags: [planning, workflow, docs]

  - id: rule_repo_atomic_leaf_tasks
    summary: Atomic leaf tasks must be executable with minimal inference.
    content: >-
      Every non-gate leaf task in a governed staged plan must be narrow enough
      for low-context execution. Use exact `references`, explicit
      `acceptance_criteria`, real `depends_on` edges, and a bounded change
      objective. Each leaf must describe one deliverable, list 1-3 exact
      starting paths, and include at least two acceptance criteria: one output
      criterion and one proof criterion. Do not create catch-all tasks such as
      `misc`, `polish`, `remaining`, `cleanup`, or `wire the rest`.
    enforcement: hard
    tags: [planning, workflow]

  - id: rule_repo_orchestrator_ownership
    summary: One orchestrator owns every multi-step plan in this repo.
    content: >-
      Multi-file or multi-step work must have one orchestrator agent
      responsible for the root plan, stage transitions, scope declarations,
      verification, review, and done. Leaf tasks are execution units, not
      planning documents, and must not silently widen scope or redefine the
      root objective.
    enforcement: hard
    tags: [planning, workflow, scope]

  - id: rule_repo_delegate_leaf_tasks
    summary: Delegate bounded leaf tasks when the tool supports sub-agents.
    content: >-
      When the tool supports sub-agents, keep the orchestrator's context narrow
      and delegate bounded leaf tasks to sub-agents. If the tool does not
      support delegation, emulate the same structure sequentially instead of
      collapsing multiple concerns into one oversized task.
    enforcement: soft
    tags: [planning, workflow, context]

  - id: rule_repo_tdd_red_green
    summary: Planned Go behavior work in this repo must record a red/green loop or an exemption.
    content: >-
      For planned behavior-changing Go work under `cmd/**` or `internal/**`,
      add a complete `tdd:red` task before implementation or a complete
      `tdd:exemption` task when TDD is intentionally skipped. The `tdd:red`
      task should name the targeted failing test or package command.
    enforcement: hard
    tags: [tests, planning, workflow]

  - id: rule_repo_tdd_test_delta
    summary: Go behavior changes in this repo need test-file deltas or an explicit exemption.
    content: >-
      For Go behavior changes under `cmd/**` or `internal/**`, keep Go
      test-file updates in the same task unless a complete `tdd:exemption` task
      records why the change is behavior-preserving or otherwise unsuitable for
      TDD.
    enforcement: hard
    tags: [tests, verify]

  - id: rule_repo_targeted_go_loop
    summary: Prefer targeted Go package tests before the broad suite.
    content: >-
      During execute and review, use the repo-local changed-package Go test
      runner first, then rely on `cli-build` and the full Go suite as broader
      confirmation.
    enforcement: soft
    tags: [tests, verify, workflow]

  - id: rule_contract_schema_lockstep
    summary: Keep v1 contracts and schema files in lockstep.
    content: >-
      Any change to payloads, results, validation, or command semantics must
      update `internal/contracts/v1`, `spec/v1` schemas, and the corresponding
      tests together.
    enforcement: hard
    tags: [contract, schema]

  - id: rule_cli_mcp_parity
    summary: Preserve CLI and MCP parity for command surfaces.
    content: >-
      Command, flag, tool, help, or envelope behavior changes must be reflected
      across `cmd/acm`, `cmd/acm-mcp`, MCP tool definitions, and associated
      tests.
    enforcement: hard
    tags: [cli, mcp]

  - id: rule_storage_parity
    summary: Keep Postgres and SQLite behavior equivalent.
    content: >-
      Persistence, migration, and parity-sensitive behavior changes must update
      both adapters with matching semantics, migrations, and regression
      coverage unless the behavior is intentionally backend-specific and
      explicitly documented.
    enforcement: hard
    tags: [postgres, sqlite, parity]

  - id: rule_onboarding_invariants
    summary: Init must produce a usable first-run state.
    content: >-
      From a clean repo, `init` should make `context` usable and `health`
      meaningful without manual recovery. Do not index ACM-managed runtime
      files or SQLite sidecars.
    enforcement: hard
    tags: [init, health]

  - id: rule_docs_and_examples_sync
    summary: Keep docs, examples, and skill-pack assets aligned with real behavior.
    content: >-
      User-facing install, help, command, or onboarding changes must update
      `README.md`, `docs/getting-started.md`, `docs/examples/*`, and
      `skills/acm-broker/**` in the same change.
    enforcement: hard
    tags: [docs, skills]

  - id: rule_workflow_gates_sync
    summary: Keep workflow gate definitions aligned with completion behavior.
    content: >-
      Changes to `done` completion-gate semantics, runnable review gates, or
      staged workflow onboarding must update `.acm/acm-workflows.yaml`,
      repo-local scripts, docs, examples, and skill-pack assets together. When
      a workflow gate defines a `run` block, satisfy it with `acm review --run`
      rather than copying the underlying reviewer command into maintainer prose.
    enforcement: hard
    tags: [workflow, completion, review]

  - id: rule_idempotent_maintenance
    summary: Maintenance commands should remain deterministic and idempotent.
    content: >-
      `sync`, `init`, and `health` fixer changes should preserve deterministic
      ordering, repeatable counters, and stable path filtering. Add tests for
      regression-sensitive path sets and summaries.
    enforcement: soft
    tags: [sync, health]

  - id: rule_verify_before_completion
    summary: Verify executable changes before done.
    content: >-
      For code, config, contract, onboarding, or behavior changes, ensure
      `.acm/acm-tests.yaml` coverage is appropriate, run `verify` with receipt
      or plan context, then `done`.
    enforcement: hard
    tags: [verify, completion]

  - id: rule_capture_durable_decisions
    summary: Persist stable architectural decisions in AMM.
    content: >-
      Record durable decisions and recurring pitfalls in AMM when they would
      reduce future rework.
    enforcement: soft
    tags: [architecture]

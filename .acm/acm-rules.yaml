version: acm.rules.v1
rules:
  - id: rule_start_with_context
    summary: Start each task with context and fetch only what is needed.
    content: Run `acm context` first, then fetch specific keys for the current step instead of broad retrieval.
    enforcement: hard
    tags: [context, workflow]

  - id: rule_plan_before_code
    summary: Plan and track multi-step work before writing code.
    content: For tasks spanning more than one step or file, create ACM work with explicit steps and acceptance criteria before implementation. Include verify:tests for code, contract, onboarding, or behavior changes. Single-file, single-purpose fixes are exempt.
    enforcement: hard
    tags: [planning, work]

  - id: rule_contract_schema_lockstep
    summary: Keep v1 contracts and schema files in lockstep.
    content: Any change to payloads, results, validation, or command semantics must update internal/contracts/v1, spec/v1 schemas, and the corresponding tests together.
    enforcement: hard
    tags: [contract, schema]

  - id: rule_cli_mcp_parity
    summary: Preserve CLI and MCP parity for command surfaces.
    content: Command, flag, tool, help, or envelope behavior changes must be reflected across cmd/acm, cmd/acm-mcp, MCP tool definitions, and associated tests.
    enforcement: hard
    tags: [cli, mcp]

  - id: rule_storage_parity
    summary: Keep Postgres and SQLite behavior equivalent.
    content: Persistence, migration, and parity-sensitive behavior changes must update both adapters with matching semantics, migrations, and regression coverage unless the behavior is intentionally backend-specific and explicitly documented.
    enforcement: hard
    tags: [postgres, sqlite, parity]

  - id: rule_onboarding_invariants
    summary: Init must produce a usable first-run state.
    content: From a clean repo, init should make context usable and health meaningful without manual recovery. Do not index ACM-managed runtime files or SQLite sidecars.
    enforcement: hard
    tags: [init, health]

  - id: rule_docs_and_examples_sync
    summary: Keep docs, examples, and skill-pack assets aligned with real behavior.
    content: User-facing install, help, command, or onboarding changes must update README, docs/getting-started, docs/examples, and skill-pack assets in the same change.
    enforcement: hard
    tags: [docs, skills]

  - id: rule_feature_plan_schema
    summary: Use the repo-local ACM feature plan schema for net-new feature work.
    content: For net-new feature work and large capability expansions, create a root ACM plan with `kind=feature`, explicit scope metadata, `spec_outline` / `refined_spec` / `implementation_plan` stage statuses, top-level `stage:*` tasks, and leaf-task acceptance criteria. When a feature splits into multiple execution streams, use `kind=feature_stream` plus `parent_plan_key`, and let `acm verify` enforce the schema through `scripts/acm-feature-plan-validate.py`.
    enforcement: hard
    tags: [planning, workflow, docs]

  - id: rule_workflow_gates_sync
    summary: Keep workflow gate definitions aligned with completion behavior.
    content: Changes to done completion-gate semantics, runnable review gates, or staged workflow onboarding must update .acm/acm-workflows.yaml, repo-local scripts, docs, examples, and skill-pack assets together. When a workflow gate defines a run block, satisfy it with acm review --run rather than copying the underlying reviewer command into maintainer prose.
    enforcement: hard
    tags: [workflow, completion, review]

  - id: rule_idempotent_maintenance
    summary: Maintenance commands should remain deterministic and idempotent.
    content: Sync, init, and health fixer changes should preserve deterministic ordering, repeatable counters, and stable path filtering. Add tests for regression-sensitive path sets and summaries.
    enforcement: soft
    tags: [sync, health]

  - id: rule_verify_before_completion
    summary: Verify executable changes before done.
    content: For code, config, contract, onboarding, or behavior changes, ensure .acm/acm-tests.yaml coverage is appropriate, run verify with receipt or plan context, then done.
    enforcement: hard
    tags: [verify, completion]

  - id: rule_capture_durable_decisions
    summary: Persist stable architectural decisions as memory.
    content: Record durable decisions and recurring pitfalls with memory when they would reduce future rework.
    enforcement: soft
    tags: [memory, architecture]

version: acm.workflows.v1
completion:
  required_tasks:
    - key: verify:tests
      select:
        changed_paths_any:
          - ".acm/**"
          - "AGENTS.md"
          - "CLAUDE.md"
          - "README.md"
          - "cmd/**"
          - "docs/**"
          - "go.mod"
          - "go.sum"
          - "internal/**"
          - "scripts/**"
          - "skills/**"
          - "spec/**"
    - key: review:cross-llm
      summary: Cross-LLM review
      rerun_requires_new_fingerprint: true
      select:
        phases:
          - review
        changed_paths_any:
          - ".acm/**"
          - "AGENTS.md"
          - "CLAUDE.md"
          - "README.md"
          - "cmd/**"
          - "docs/**"
          - "go.mod"
          - "go.sum"
          - "internal/**"
          - "scripts/**"
          - "skills/**"
          - "spec/**"
      run:
        argv:
          - "scripts/acm-cross-review.sh"
        cwd: .
        timeout_sec: 1800
